services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: floorplan
      POSTGRES_PASSWORD: floorplan
      POSTGRES_DB: floorplan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floorplan -d floorplan"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://floorplan:floorplan@postgres:5432/floorplan
      ARTIFACT_DIR: /var/lib/glb-floorplan/artifacts
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8080}:8080"
    volumes:
      - backend-artifacts:/var/lib/glb-floorplan/artifacts

volumes:
  postgres-data:
  backend-artifacts:
